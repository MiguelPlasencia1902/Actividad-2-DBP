<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Eliminar Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4 p-lg-5 text-center">
                        <p class="text-danger text-uppercase small mb-2">Acción irreversible</p>
                        <h1 class="h3 mb-3">Eliminar producto</h1>
                        <p class="text-secondary mb-4">
                            ¿Seguro que deseas eliminar el producto <strong>"{{ producto.nombre }}"</strong>?
                        </p>

                        <form method="POST" class="d-flex flex-column flex-sm-row justify-content-center gap-2">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-danger px-4">Sí, eliminar</button>
                            <a href="{% url 'lista_productos' %}" class="btn btn-outline-secondary px-4">Cancelar</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
