<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Crear Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <style>
        .producto-form label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #24324a;
        }

        .producto-form input,
        .producto-form textarea,
        .producto-form select {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 1px solid #ced4da;
            border-radius: 0.75rem;
            background-color: #fff;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .producto-form textarea {
            min-height: 160px;
            resize: vertical;
        }

        .producto-form input:focus,
        .producto-form textarea:focus,
        .producto-form select:focus {
            border-color: #86b7fe;
            outline: 0;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
        }

        .producto-form .errorlist {
            margin: 0.5rem 0 0;
            padding-left: 1rem;
            color: #dc3545;
            font-size: 0.9rem;
        }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4 p-lg-5">
                        <div class="mb-4">
                            <p class="text-secondary text-uppercase small mb-1">Inventario</p>
                            <h1 class="h2 mb-0">Crear producto</h1>
                        </div>

                        <form method="POST" class="producto-form">
                            {% csrf_token %}

                            <div class="mb-4">
                                <label for="{{ form.nombre.id_for_label }}" class="form-label">Nombre</label>
                                {{ form.nombre }}
                                {{ form.nombre.errors }}
                            </div>

                            <div class="mb-4">
                                <label for="{{ form.descripcion.id_for_label }}" class="form-label">Descripción</label>
                                {{ form.descripcion }}
                                {{ form.descripcion.errors }}
                            </div>

                            <div class="row g-4">
                                <div class="col-12 col-md-6">
                                    <label for="{{ form.precio.id_for_label }}" class="form-label">Precio</label>
                                    {{ form.precio }}
                                    {{ form.precio.errors }}
                                </div>
                                <div class="col-12 col-md-6">
                                    <label for="{{ form.cantidad_stock.id_for_label }}" class="form-label">Cantidad en stock</label>
                                    {{ form.cantidad_stock }}
                                    {{ form.cantidad_stock.errors }}
                                </div>
                            </div>

                            <div class="d-flex flex-column flex-sm-row gap-2 mt-4">
                                <button type="submit" class="btn btn-primary px-4">Guardar</button>
                                <a href="{% url 'lista_productos' %}" class="btn btn-outline-secondary px-4">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
